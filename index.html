<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prisma</title>
  <style>
    :root {
      --bg: #050505;
      --sidebar: #0a0a0a;
      --chat-bg: #0f0f0f;
      --accent: #00f5ff;
      --text: #e0e0e0;
      --prisma: #1a1a1a;
      --user: #1f2a44;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      touch-action: manipulation;
    }

    .app { display: flex; height: 100vh; }

    /* ==================== SIDEBAR ==================== */
    .sidebar {
      width: 300px;
      background: var(--sidebar);
      border-right: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      transition: transform 0.4s ease;
      z-index: 100;
    }

    .logo-container {
      padding: 24px 20px 16px;
      text-align: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo {
      width: 82px;
      height: 82px;
      margin: 0 auto 10px;
      background: white;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 46px;
      font-weight: 900;
      color: #050505;
      box-shadow: 0 0 35px rgba(0, 245, 255, 0.7);
    }

    .logo-text {
      font-size: 29px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--accent);
    }

    .new-chat-btn {
      margin: 16px 20px;
      padding: 15px;
      background: #1f1f1f;
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      padding: 13px 20px;
      border-radius: 12px;
      margin: 4px 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .chat-item:hover, .chat-item.active {
      background: #1f1f1f;
    }

    /* ==================== MAIN ==================== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--chat-bg);
    }

    .header {
      padding: 16px 24px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 82%;
    }

    .prisma-message { align-self: flex-start; }
    .user-message { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.48;
      font-size: 16px;
    }

    .prisma-bubble { background: var(--prisma); border-bottom-left-radius: 6px; }
    .user-bubble { background: var(--user); border-bottom-right-radius: 6px; }

    /* ==================== INPUT ==================== */
    .input-area {
      padding: 16px 20px 26px;
      background: var(--chat-bg);
      border-top: 1px solid #1a1a1a;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border-radius: 9999px;
      padding: 6px 10px;
      gap: 6px;
    }

    .action-btn {
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 23px;
      color: #aaa;
      border-radius: 50%;
      cursor: pointer;
    }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: white;
      font-size: 16.5px;
      padding: 10px;
    }

    .send-button {
      width: 52px;
      height: 52px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50%;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 245, 255, 0.5);
    }

    /* Typing */
    .typing {
      padding: 12px 18px;
      background: var(--prisma);
      border-radius: 20px;
      width: fit-content;
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: #888;
      border-radius: 50%;
      animation: typingAnim 1.4s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingAnim {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="logo-container">
        <div class="logo">▲</div>
        <div class="logo-text">PRISMA</div>
      </div>

      <button class="new-chat-btn" onclick="newChat()">+ Новый чат</button>

      <div class="chat-list" id="chat-list"></div>

      <div class="model-selector">
        <strong>Модель:</strong><br>
        <select id="model-select" onchange="changeModel()">
          <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
          <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        </select>
      </div>
    </div>

    <!-- Main Chat -->
    <div class="main">
      <div class="header">
        <div class="chat-title" id="chat-title">Prisma</div>
        <div onclick="toggleSidebar()" style="font-size: 32px; cursor: pointer; padding: 0 8px;">≡</div>
      </div>

      <div class="chat-container" id="chat-container"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <div class="action-btn" onclick="attachFile()">📎</div>
          <div class="action-btn" onclick="openGallery()">📷</div>
          <div class="action-btn" onclick="openCamera()">📹</div>
          
          <input type="text" id="message-input" placeholder="Сообщение Prisma..." autocomplete="off">
          
          <button class="send-button" id="send-btn">↑</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chat-container');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user-message' : 'prisma-message'}`;
      
      msg.innerHTML = `
        ${!isUser ? `<div class="avatar" style="background: linear-gradient(135deg, #00f5ff, #0099cc);">P</div>` : ''}
        <div class="bubble \( {isUser ? 'user-bubble' : 'prisma-bubble'}"> \){text}</div>
      `;
      
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function simulateTyping(callback) {
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = `<div class="dot"></div><div class="dot"></div><div class="dot"></div>`;
      chatContainer.appendChild(typing);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      setTimeout(() => {
        typing.remove();
        if (callback) callback();
      }, 1400);
    }

    function sendMessage() {
      if (input.value.trim() === '') return;

      addMessage(input.value, true);
      const userText = input.value;
      input.value = '';

      simulateTyping(() => {
        addMessage("Принял, братан. Что дальше?", false);
      });
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // Приветствие
    window.onload = () => {
      setTimeout(() => {
        addMessage("Здарова, брат. Prisma на связи. Чем будем ебать мозг сегодня?", false);
      }, 700);
    };

    // Функции-заглушки
    function newChat() { alert("Новый чат создан"); }
    function toggleSidebar() { alert("Боковая панель (в Telegram Mini App обычно скрывается)"); }
    function attachFile() { alert("Прикрепить файл"); }
    function openGallery() { alert("Открыть галерею"); }
    function openCamera() { alert("Открыть камеру"); }
    function changeModel() { alert("Модель изменена"); }
  </script>
</body>
</html>
