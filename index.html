<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prisma</title>
  <style>
    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --card: #111111;
      --text: #e0e0e0;
      --accent: #aaaaaa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app { display: flex; height: 100vh; position: relative; }

    /* Sidebar */
    .sidebar {
      position: fixed;
      left: -320px;
      top: 0;
      width: 320px;
      height: 100%;
      background: var(--surface);
      border-right: 1px solid #1a1a1a;
      transition: left 0.4s ease;
      z-index: 300;
      padding-top: 70px;
    }

    .sidebar.open { left: 0; }

    .logo-container {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 18px;
      text-align: center;
      border-bottom: 1px solid #1a1a1a;
    }

    .logo { font-size: 32px; font-weight: 900; color: var(--accent); letter-spacing: -2px; }

    .new-chat-btn {
      margin: 16px 20px;
      padding: 15px;
      background: #1f1f1f;
      border: none;
      border-radius: 14px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .search-input {
      margin: 10px 20px;
      padding: 10px 14px;
      background: #1a1a1a;
      border: none;
      border-radius: 10px;
      color: white;
      width: calc(100% - 40px);
    }

    .chat-list {
      height: calc(100vh - 280px);
      overflow-y: auto;
      padding: 8px;
    }

    .chat-item {
      padding: 14px 20px;
      border-radius: 12px;
      margin: 4px 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-item:hover, .chat-item.active {
      background: #1f1f1f;
    }

    .delete-btn {
      color: #ff4444;
      font-size: 18px;
      padding: 0 8px;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-size: 18px;
      font-weight: 600;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px 100px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: var(--bg);
    }

    .message {
      max-width: 85%;
      display: flex;
      gap: 8px;
    }

    .prisma-msg { align-self: flex-start; }
    .user-msg { align-self: flex-end; flex-direction: row-reverse; }

    .bubble {
      padding: 13px 17px;
      border-radius: 18px;
      line-height: 1.45;
      font-size: 16px;
    }

    .prisma-bubble { background: var(--card); border-bottom-left-radius: 6px; }
    .user-bubble { background: #1f1f1f; border-bottom-right-radius: 6px; }

    /* Input */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid #1a1a1a;
      padding: 12px 12px 22px;
      z-index: 200;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 9999px;
      padding: 6px 8px;
    }

    .action-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: #888;
      border-radius: 50%;
    }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 16.5px;
      padding: 8px 10px;
    }

    .send-btn {
      width: 48px;
      height: 48px;
      background: #ffffff;
      color: #000;
      border: none;
      border-radius: 50%;
      font-size: 24px;
    }

    /* Modal */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 400;
    }

    .modal-content {
      background: #111;
      padding: 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="logo-container">
        <div class="logo">PRISMA</div>
      </div>

      <button class="new-chat-btn" onclick="newChat()">+ Новый чат</button>
      <input type="text" class="search-input" id="search-input" placeholder="Поиск чатов..." onkeyup="searchChats()">

      <div class="chat-list" id="chat-list"></div>

      <div style="padding: 20px; border-top: 1px solid #1a1a1a;">
        <strong>Модель:</strong><br>
        <select id="model-select" style="width:100%; padding:12px; background:#1a1a1a; color:white; border:none; border-radius:10px; margin-top:8px;">
          <option value="flash">Gemini 2.5 Flash</option>
          <option value="pro">Gemini 2.5 Pro</option>
        </select>
      </div>
    </div>

    <!-- Main -->
    <div class="main">
      <div class="header">
        <div onclick="toggleSidebar()" style="font-size:28px; cursor:pointer;">≡</div>
        <div id="chat-title">Prisma</div>
        <div onclick="showMenu()" style="font-size:28px; cursor:pointer;">⋮</div>
      </div>

      <div class="chat-container" id="chat"></div>

      <div class="input-area">
        <div class="input-wrapper">
          <div class="action-btn" onclick="attachFile()">📎</div>
          <div class="action-btn" onclick="openGallery()">📷</div>
          <div class="action-btn" onclick="openCamera()">📹</div>
          
          <input type="text" id="message-input" placeholder="Сообщение Prisma..." autocomplete="off">
          
          <button class="send-btn" id="send-btn">↑</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Settings -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h3 style="margin-bottom:20px;">Настройки Prisma</h3>
      <p>Персонализация</p>
      <p>Очистить все чаты</p>
      <p>Экспорт истории</p>
      <button onclick="closeModal()" style="margin-top:30px; padding:12px 24px; background:#333; color:white; border:none; border-radius:10px; width:100%;">Закрыть</button>
    </div>
  </div>

  <script>
    let currentChatId = null;
    let chats = JSON.parse(localStorage.getItem('prisma_chats')) || {};

    const chatContainer = document.getElementById('chat');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const sidebar = document.getElementById('sidebar');
    const chatList = document.getElementById('chat-list');
    const chatTitle = document.getElementById('chat-title');
    const modal = document.getElementById('modal');

    function saveChats() {
      localStorage.setItem('prisma_chats', JSON.stringify(chats));
    }

    function renderChatList(filteredChats = chats) {
      chatList.innerHTML = '';
      Object.keys(filteredChats).reverse().forEach(id => {
        const chat = filteredChats[id];
        const div = document.createElement('div');
        div.className = `chat-item ${id === currentChatId ? 'active' : ''}`;
        div.innerHTML = `
          <span>${chat.title || 'Новый чат'}</span>
          <span class="delete-btn" onclick="event.stopImmediatePropagation(); deleteChat('${id}')">🗑</span>
        `;
        div.onclick = () => loadChat(id);
        chatList.appendChild(div);
      });
    }

    function searchChats() {
      const query = document.getElementById('search-input').value.toLowerCase();
      const filtered = {};
      Object.keys(chats).forEach(id => {
        if (chats[id].title && chats[id].title.toLowerCase().includes(query)) {
          filtered[id] = chats[id];
        }
      });
      renderChatList(filtered);
    }

    function newChat() {
      const id = Date.now().toString();
      chats[id] = { title: "Новый чат", messages: [] };
      currentChatId = id;
      saveChats();
      renderChatList();
      loadChat(id);
      toggleSidebar();
    }

    function loadChat(id) {
      currentChatId = id;
      chatContainer.innerHTML = '';
      chatTitle.textContent = chats[id].title || "Prisma";

      chats[id].messages.forEach(msg => {
        addMessage(msg.text, msg.isUser);
      });

      renderChatList();
    }

    function deleteChat(id) {
      if (confirm("Удалить этот чат?")) {
        delete chats[id];
        saveChats();
        if (currentChatId === id) {
          const keys = Object.keys(chats);
          currentChatId = keys.length ? keys[0] : null;
        }
        renderChatList();
        if (currentChatId) loadChat(currentChatId);
      }
    }

    function addMessage(text, isUser = false) {
      if (!currentChatId) newChat();

      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user-msg' : 'prisma-msg'}`;
      msg.innerHTML = `<div class="bubble \( {isUser ? 'user-bubble' : 'prisma-bubble'}"> \){text}</div>`;
      chatContainer.appendChild(msg);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      chats[currentChatId].messages.push({ text, isUser });
      saveChats();
    }

    function sendMessage() {
      if (input.value.trim() === '') return;
      addMessage(input.value, true);
      input.value = '';

      setTimeout(() => {
        addMessage("Принял, брат.", false);
      }, 800);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    function toggleSidebar() {
      sidebar.classList.toggle('open');
    }

    function showMenu() {
      modal.style.display = 'flex';
    }

    function closeModal() {
      modal.style.display = 'none';
    }

    // Заглушки
    function attachFile() { alert("Прикрепить файл"); }
    function openGallery() { alert("Галерея"); }
    function openCamera() { alert("Камера"); }

    // Инициализация
    window.onload = () => {
      if (Object.keys(chats).length === 0) {
        newChat();
      } else {
        currentChatId = Object.keys(chats)[0];
        loadChat(currentChatId);
      }
    };
  </script>
</body>
</html>
