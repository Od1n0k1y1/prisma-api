<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISMA OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .chat-container { height: calc(100vh - 80px); overflow-y: auto; padding: 20px; }
        .input-area { position: fixed; bottom: 0; width: 100%; padding: 10px; background: #050505; border-top: 1px solid #111; }
        .log-line { font-family: monospace; font-size: 10px; color: #666; }
    </style>
</head>
<body>

<div class="chat-container" id="chat">
    <div id="messages"></div>
</div>

<div class="input-area">
    <input type="text" id="msg" class="w-full bg-[#111] p-3 rounded-lg border border-[#222] focus:outline-none" placeholder="Сообщение...">
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('msg');

    function renderMessage(role, text) {
        const div = document.createElement('div');
        div.className = `p-3 my-2 rounded-xl ${role === 'user' ? 'bg-[#1a1a1a] ml-auto w-fit' : 'bg-transparent border border-[#111]'} text-sm`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    input.addEventListener('keypress', async (e) => {
        if (e.key === 'Enter' && input.value) {
            const text = input.value;
            renderMessage('user', text);
            input.value = '';

            // Локальный вызов бэка (если сервер запущен в Pydroid)
            try {
                const res = await fetch('http://127.0.0.1:3000/api/gemini/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text, history: [] })
                });
                const data = await res.json();
                renderMessage('model', data.text || "Ошибка системы");
            } catch (err) {
                renderMessage('model', "CORE: Соединение с Pydroid прервано.");
            }
        }
    });
</script>
</body>
</html>
