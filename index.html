<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISMA OS PRO - GROK EDITION</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg-pure-black: #000000;
        --bg-main-dark: #111111;
        --bg-card-dark: #1a1a1a;
        --bg-input-dark: #222222;
        --border-monochrome: #333333;
        --text-absolute-white: #ffffff;
        --text-muted-gray: #888888;
        --text-dimmed-gray: #555555;
        --accent-grok: #ffffff;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', 'Ubuntu', sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; }
    body { background-color: var(--bg-pure-black); color: var(--text-absolute-white); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    
    /* Хедер (Grok Style) */
    .grok-header { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border-monochrome); background: var(--bg-pure-black); z-index: 100; }
    .header-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-absolute-white); }
    
    /* Селектор модели (Молния) */
    .model-selector-pill { display: flex; align-items: center; gap: 8px; background: var(--bg-card-dark); padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: background 0.2s; border: 1px solid var(--border-monochrome); }
    .model-selector-pill:active { background: var(--border-monochrome); }
    .model-selector-pill span { font-size: 15px; font-weight: 700; }
    .model-selector-pill svg { width: 16px; height: 16px; color: var(--text-absolute-white); }

    /* Чат зона */
    .chat-container { flex: 1; overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
    
    /* Сообщения */
    .msg-wrapper { display: flex; flex-direction: column; width: 100%; max-width: 90%; }
    .msg-wrapper.user { align-self: flex-end; align-items: flex-end; }
    .msg-wrapper.bot { align-self: flex-start; align-items: flex-start; }
    
    .msg-bubble { padding: 14px 18px; font-size: 16px; line-height: 1.5; word-wrap: break-word; user-select: text; border-radius: 24px; }
    .msg-wrapper.user .msg-bubble { background-color: var(--bg-input-dark); color: var(--text-absolute-white); border-bottom-right-radius: 6px; }
    .msg-wrapper.bot .msg-bubble { background-color: transparent; color: var(--text-absolute-white); padding-left: 0; }
    
    .msg-image-preview { max-width: 250px; border-radius: 16px; margin-bottom: 10px; border: 1px solid var(--border-monochrome); object-fit: cover; }

    /* Зона ввода (Grok Style) */
    .input-area-container { padding: 12px 16px 24px 16px; background: var(--bg-pure-black); }
    .input-pill { background: var(--bg-card-dark); border: 1px solid var(--border-monochrome); border-radius: 30px; display: flex; flex-direction: column; padding: 6px 16px; transition: border-color 0.3s; }
    .input-pill:focus-within { border-color: var(--text-muted-gray); }
    
    /* Превью прикрепленного файла */
    .attachment-preview-bar { display: none; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-monochrome); margin-bottom: 8px; }
    .attachment-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted-gray); }
    .attachment-info svg { width: 16px; height: 16px; }
    .remove-attachment { cursor: pointer; color: var(--text-absolute-white); font-weight: bold; padding: 4px; }

    .input-row { display: flex; align-items: center; gap: 12px; }
    .input-row input { flex: 1; background: none; border: none; color: var(--text-absolute-white); font-size: 16px; padding: 12px 0; outline: none; }
    .input-row input::placeholder { color: var(--text-dimmed-gray); }
    
    .action-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: var(--text-muted-gray); transition: all 0.2s; }
    .action-btn:active { background: var(--bg-input-dark); color: var(--text-absolute-white); }
    .action-btn.submit { background: var(--text-absolute-white); color: var(--bg-pure-black); }
    .action-btn.submit:active { transform: scale(0.95); }

    /* Шторки (Bottom Sheets) */
    .sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 500; display: none; opacity: 0; transition: opacity 0.3s; }
    .sheet-overlay.active { display: block; opacity: 1; backdrop-filter: blur(2px); }
    
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-main-dark); border-top-left-radius: 24px; border-top-right-radius: 24px; z-index: 501; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1); padding: 20px; border-top: 1px solid var(--border-monochrome); }
    .bottom-sheet.active { transform: translateY(0); }
    
    .sheet-handle { width: 36px; height: 4px; background: var(--border-monochrome); border-radius: 2px; margin: 0 auto 20px auto; }

    /* Стили выбора модели */
    .model-option { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-radius: 16px; cursor: pointer; margin-bottom: 8px; border: 1px solid transparent; }
    .model-option:active { background: var(--bg-card-dark); }
    .model-option.selected { border-color: var(--border-monochrome); background: var(--bg-card-dark); }
    
    .model-info { display: flex; align-items: center; gap: 16px; }
    .model-icon { width: 24px; height: 24px; color: var(--text-absolute-white); }
    .model-text h4 { font-size: 16px; font-weight: 700; color: var(--text-absolute-white); margin-bottom: 4px; }
    .model-text p { font-size: 13px; color: var(--text-muted-gray); }
    .check-icon { display: none; color: var(--text-absolute-white); }
    .model-option.selected .check-icon { display: block; }

    /* Стили меню плюсика */
    .attach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .attach-item { background: var(--bg-card-dark); border: 1px solid var(--border-monochrome); border-radius: 20px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; transition: all 0.2s; }
    .attach-item:active { background: var(--bg-input-dark); transform: scale(0.97); }
    .attach-item svg { width: 28px; height: 28px; color: var(--text-absolute-white); stroke-width: 1.5; }
    .attach-item span { font-size: 13px; font-weight: 500; }

    /* Анимация загрузки */
    .thinking-dots { display: flex; gap: 4px; align-items: center; padding: 10px 0; }
    .dot { width: 6px; height: 6px; background: var(--text-muted-gray); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    
    /* Скрытые инпуты */
    .hidden-inputs { display: none; }
    </style>
</head>
<body>

    <div class="hidden-inputs">
        <input type="file" id="sysGallery" accept="image/*">
        <input type="file" id="sysCamera" accept="image/*" capture="environment">
        <input type="file" id="sysDocs" accept="*/*">
    </div>

    <div class="sheet-overlay" id="overlay" onclick="closeSheets()"></div>

    <div class="bottom-sheet" id="modelSheet">
        <div class="sheet-handle"></div>
        
        <div class="model-option selected" id="mod_fast" onclick="selectModel('fast', 'Быстрый')">
            <div class="model-info">
                <svg class="model-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                <div class="model-text">
                    <h4>Быстрый</h4>
                    <p>Prisma 2.5</p>
                </div>
            </div>
            <svg class="check-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div class="model-option" id="mod_casual" onclick="selectModel('casual', 'Повседневный')">
            <div class="model-info">
                <svg class="model-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                <div class="model-text">
                    <h4>Повседневный</h4>
                    <p>Prisma 3.5</p>
                </div>
            </div>
            <svg class="check-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div class="model-option" id="mod_expert" onclick="selectModel('expert', 'Эксперт')">
            <div class="model-info">
                <svg class="model-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                <div class="model-text">
                    <h4>Эксперт</h4>
                    <p>Prisma 3.1</p>
                </div>
            </div>
            <svg class="check-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
    </div>

    <div class="bottom-sheet" id="attachSheet">
        <div class="sheet-handle"></div>
        <div class="attach-grid">
            <div class="attach-item" onclick="triggerSysInput('sysGallery')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span>Фото</span>
            </div>
            <div class="attach-item" onclick="triggerSysInput('sysCamera')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                <span>Камера</span>
            </div>
            <div class="attach-item" onclick="triggerSysInput('sysDocs')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                <span>Файл</span>
            </div>
        </div>
    </div>

    <div class="grok-header">
        <div class="header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </div>
        
        <div class="model-selector-pill" onclick="openSheet('modelSheet')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            <span id="currentModelLabel">Быстрый</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>

        <div class="header-icon" onclick="clearChat()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        </div>
    </div>

    <div class="chat-container" id="chatWindow">
        </div>

    <div class="input-area-container">
        <div class="input-pill">
            
            <div class="attachment-preview-bar" id="attachPreviewBar">
                <div class="attachment-info">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                    <span id="attachFileName">файл.jpg</span>
                </div>
                <div class="remove-attachment" onclick="removeAttachment()">✕</div>
            </div>

            <div class="input-row">
                <div class="action-btn" onclick="openSheet('attachSheet')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:20px;height:20px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </div>
                
                <input type="text" id="msgInput" placeholder="Спроси Prisma..." onkeypress="if(event.key==='Enter') sendMessage()">
                
                <div class="action-btn submit" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:18px;height:18px;"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                </div>
            </div>
        </div>
    </div>

    <script>
    // Инициализация телеги (на всякий)
    try { window.Telegram.WebApp.expand(); } catch(e){}

    // Системные переменные (типа крутая архитектура как ты просил)
    const PRISMA_CORE = {
        model: 'fast',
        buffer: null,
        chatData: []
    };

    const PRISMA_UI_EVENT_INTERCEPTOR_NODE = {
        bindGlobalListeners: function() {
            window.addEventListener('resize', () => {
                console.log('Layout recalculated');
            });
        }
    };
    PRISMA_UI_EVENT_INTERCEPTOR_NODE.bindGlobalListeners();

    // Шторки
    function openSheet(id) {
        document.getElementById('overlay').classList.add('active');
        document.getElementById(id).classList.add('active');
    }

    function closeSheets() {
        document.getElementById('overlay').classList.remove('active');
        document.querySelectorAll('.bottom-sheet').forEach(el => el.classList.remove('active'));
    }

    // Выбор модели
    function selectModel(id, name) {
        PRISMA_CORE.model = id;
        document.getElementById('currentModelLabel').innerText = name;
        
        document.querySelectorAll('.model-option').forEach(el => el.classList.remove('selected'));
        document.getElementById('mod_' + id).classList.add('selected');
        
        closeSheets();
    }

    // Работа с файлами
    function triggerSysInput(inputId) {
        closeSheets();
        document.getElementById(inputId).click();
    }

    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onloadend = () => {
            PRISMA_CORE.buffer = {
                b64: reader.result,
                name: file.name,
                type: file.type
            };
            document.getElementById('attachFileName').innerText = file.name;
            document.getElementById('attachPreviewBar').style.display = 'flex';
        };
        reader.readAsDataURL(file);
        event.target.value = ''; // Сброс
    }

    document.getElementById('sysGallery').addEventListener('change', handleFile);
    document.getElementById('sysCamera').addEventListener('change', handleFile);
    document.getElementById('sysDocs').addEventListener('change', handleFile);

    function removeAttachment() {
        PRISMA_CORE.buffer = null;
        document.getElementById('attachPreviewBar').style.display = 'none';
    }

    // Чат лоджик
    function appendMessage(role, text, mediaObj = null) {
        const chat = document.getElementById('chatWindow');
        const wrap = document.createElement('div');
        wrap.className = `msg-wrapper ${role}`;

        let content = '';
        if (mediaObj && mediaObj.type.startsWith('image/')) {
            content += `<img src="${mediaObj.b64}" class="msg-image-preview">`;
        }
        
        if (text) {
            content += `<div class="msg-bubble">${text}</div>`;
        }

        wrap.innerHTML = content;
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
    }

    function showThinking() {
        const chat = document.getElementById('chatWindow');
        const wrap = document.createElement('div');
        wrap.className = `msg-wrapper bot`;
        wrap.id = 'thinkingNode';
        wrap.innerHTML = `
            <div class="msg-bubble">
                <div class="thinking-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        `;
        chat.appendChild(wrap);
        chat.scrollTop = chat.scrollHeight;
    }

    function hideThinking() {
        const node = document.getElementById('thinkingNode');
        if(node) node.remove();
    }

    function sendMessage() {
        const input = document.getElementById('msgInput');
        const text = input.value.trim();
        const media = PRISMA_CORE.buffer;

        if (!text && !media) return;

        // Рендер ответа юзера
        appendMessage('user', text, media);
        
        // Очистка
        input.value = '';
        removeAttachment();
        
        // Имитация сетки
        showThinking();
        
        // Заглушка, тут ты должен кидать data в ТГ или на свой бэк
        setTimeout(() => {
            hideThinking();
            appendMessage('bot', `Принял пакет данных. Обработал через модель: ${PRISMA_CORE.model}. Всё чётко.`);
        }, 1500);
    }

    function clearChat() {
        document.getElementById('chatWindow').innerHTML = '';
    }
    </script>
</body>
</html>
