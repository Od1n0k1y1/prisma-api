<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRISMA OS PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    :root {
        --bg-pure-black: #000000;
        --bg-main-dark: #080808;
        --bg-card-dark: #151515;
        --bg-input-dark: #111111;
        --border-monochrome: #1c1c1c;
        --border-focus: #333333;
        --text-absolute-white: #ffffff;
        --text-muted-gray: #828282;
        --text-dimmed-gray: #4d4d4d;
        --accent-glow: rgba(255, 255, 255, 0.02);
    }

    * { 
        box-sizing: border-box; 
        margin: 0; 
        padding: 0; 
        font-family: 'Space Grotesk', 'Ubuntu', -apple-system, sans-serif; 
        -webkit-tap-highlight-color: transparent; 
        user-select: none; 
    }

    body { 
        background-color: var(--bg-pure-black); 
        color: var(--text-absolute-white); 
        height: 100vh; 
        overflow: hidden; 
        display: flex; 
        position: relative;
    }

    /* САЙДБАР (СЕНСОРНЫЙ ВЫЕЗД) */
    .sidebar-drawer-container { 
        width: 285px; 
        background-color: var(--bg-main-dark); 
        border-right: 1px solid var(--border-monochrome); 
        display: flex; 
        flex-direction: column; 
        position: absolute; 
        top: 0; 
        left: 0; 
        bottom: 0; 
        z-index: 2500; 
        transform: translateX(-100%); 
        transition: transform 0.24s cubic-bezier(0.1, 0.9, 0.2, 1); 
    }
    .sidebar-drawer-container.open { 
        transform: translateX(0); 
    }
    
    .sidebar-profile-header { 
        padding: 22px 18px; 
        display: flex; 
        align-items: center; 
        gap: 12px; 
        border-bottom: 1px solid var(--border-monochrome); 
    }
    .profile-avatar-circle { 
        width: 40px; 
        height: 40px; 
        border-radius: 50%; 
        background: var(--bg-card-dark); 
        display: flex; 
        align-items: center; 
        justify-content: center;
        overflow: hidden;
    }
    .profile-avatar-circle svg {
        width: 20px;
        height: 20px;
        color: var(--text-absolute-white);
    }
    .profile-text-meta { 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
    }
    .profile-main-title { 
        font-size: 14px; 
        font-weight: 700; 
        color: var(--text-absolute-white); 
    }
    .profile-sub-email { 
        font-size: 11px; 
        color: var(--text-muted-gray); 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
        margin-top: 1px; 
    }

    .sidebar-navigation-area { 
        flex: 1; 
        overflow-y: auto; 
        padding: 16px 12px; 
    }
    .action-btn-new-chat { 
        border: 1px solid var(--border-monochrome); 
        padding: 11px; 
        border-radius: 99px; 
        text-align: center; 
        font-size: 13px; 
        font-weight: 700; 
        cursor: pointer; 
        margin-bottom: 20px; 
        background: var(--bg-pure-black);
        transition: background 0.15s, border-color 0.15s; 
    }
    .action-btn-new-chat:active { 
        background-color: var(--bg-card-dark); 
        border-color: var(--text-dimmed-gray);
    }
    
    .sidebar-group-title { 
        font-size: 10px; 
        font-weight: 700; 
        text-transform: uppercase; 
        color: var(--text-muted-gray); 
        letter-spacing: 0.6px; 
        margin: 12px 6px 8px 6px; 
    }
    .history-items-list { 
        display: flex; 
        flex-direction: column; 
        gap: 4px; 
    }
    .history-row-node { 
        padding: 9px 12px; 
        border-radius: 10px; 
        font-size: 13.5px; 
        color: var(--text-absolute-white); 
        cursor: pointer; 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        gap: 8px; 
        transition: background 0.1s;
    }
    .history-row-node span { 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
        flex: 1; 
    }
    .history-row-node .delete-node-trigger { 
        color: var(--text-dimmed-gray); 
        font-size: 14px; 
        padding: 2px 6px; 
        border-radius: 4px; 
    }
    .history-row-node .delete-node-trigger:hover { 
        color: #ff4444; 
    }
    .history-row-node:active, .history-row-node.active { 
        background-color: var(--bg-card-dark); 
    }

    /* ОСНОВНОЙ ЭКРАН */
    .viewport-main-app { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        height: 100vh; 
        position: relative; 
        background-color: var(--bg-pure-black); 
    }
    .global-layout-shading-mask { 
        position: absolute; 
        top: 0; 
        left: 0; 
        right: 0; 
        bottom: 0; 
        background: rgba(0,0,0,0.5); 
        display: none; 
        z-index: 2400; 
        backdrop-filter: blur(1.5px);
    }
    .global-layout-shading-mask.visible { 
        display: block; 
    }

    /* ТОНКИЙ ХЕДЕР В СТИЛЕ GROK (ФОТО 2) */
    .navbar-top-header { 
        height: 48px; 
        border-bottom: 1px solid var(--border-monochrome); 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 0 16px; 
        background-color: var(--bg-pure-black); 
        position: sticky;
        top: 0;
        z-index: 1000; 
    }
    .navbar-action-trigger { 
        width: 34px; 
        height: 34px; 
        display: flex; 
        align-items: center; 
        cursor: pointer; 
    }
    .navbar-action-trigger svg {
        width: 20px;
        height: 20px;
        color: var(--text-absolute-white);
    }

    /* ЧАТ СКРОЛЛЕР */
    .chat-scroller-viewport { 
        flex: 1; 
        overflow-y: auto; 
        padding: 16px; 
        display: flex; 
        flex-direction: column; 
        gap: 18px; 
        position: relative; 
    }
    
    /* ЦЕНТРАЛЬНЫЙ ТРЕУГОЛЬНИК PRISMA СТРОГО ИЗ 2236.JPG */
    .brand-logo-centered-overlay { 
        position: absolute; 
        top: 44%; 
        left: 50%; 
        transform: translate(-50%, -50%); 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        pointer-events: none; 
        transition: opacity 0.22s ease-out; 
        z-index: 10;
    }
    .brand-logo-centered-overlay svg { 
        width: 90px; 
        height: 90px; 
    }

    /* СТИЛИ ПУЗЫРЕЙ И СООБЩЕНИЙ */
    .message-bubble-wrapper { 
        display: flex; 
        flex-direction: column; 
        width: 100%; 
        position: relative; 
    }
    .message-content-node { 
        max-width: 85%; 
        font-size: 15px; 
        line-height: 1.5; 
        word-wrap: break-word; 
        user-select: text; 
    }
    .message-bubble-wrapper.user-side .message-content-node { 
        background-color: var(--bg-card-dark); 
        color: var(--text-absolute-white); 
        align-self: flex-end; 
        padding: 11px 16px;
        border-radius: 18px;
        border: 1px solid rgba(255,255,255,0.01);
    }
    .message-bubble-wrapper.bot-side .message-content-node { 
        background-color: transparent; 
        color: var(--text-absolute-white); 
        align-self: flex-start; 
        padding: 4px 0; 
    }
    
    .rendered-media-node { 
        max-width: 220px; 
        max-height: 160px; 
        border-radius: 12px; 
        margin-bottom: 6px; 
        border: 1px solid var(--border-monochrome); 
        display: block; 
        object-fit: cover; 
    }
    .rendered-document-node {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg-card-dark);
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid var(--border-monochrome);
        margin-bottom: 6px;
        max-width: 240px;
    }
    .rendered-document-node svg {
        width: 20px;
        height: 20px;
        color: var(--text-muted-gray);
    }
    .rendered-document-node span {
        font-size: 12.5px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    /* БЕГАЮЩАЯ КАРЕТКА ПЕЧАТИ (GROK STYLE) */
    .typing-terminal-cursor {
        display: inline-block;
        width: 7px;
        height: 14px;
        background-color: var(--text-absolute-white);
        margin-left: 3px;
        vertical-align: middle;
        animation: cursorBlinkAnimation 0.8s infinite steps(2);
    }
    @keyframes cursorBlinkAnimation {
        0% { opacity: 0; }
        100% { opacity: 1; }
    }
    
    .bot-thinking-loader-pills { 
        display: flex; 
        align-items: center; 
        gap: 4px; 
        padding: 10px 0;
        align-self: flex-start; 
    }
    .thinking-circle-dot { 
        width: 5px; 
        height: 5px; 
        background: var(--text-muted-gray); 
        border-radius: 50%; 
        animation: thinkingPulseAnimation 1.4s infinite ease-in-out both; 
    }
    .thinking-circle-dot:nth-child(1) { animation-delay: -0.32s; }
    .thinking-circle-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes thinkingPulseAnimation { 
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 
        40% { transform: scale(1.1); opacity: 1; } 
    }

    /* ОВАЛЬНЫЙ ПАДДИНГ-ИНПУТ В СТИЛЕ GROK (ФОТО 2) */
    .dock-input-bottom-layout { 
        padding: 10px 14px 16px 14px; 
        background-color: var(--bg-pure-black); 
    }
    .input-pill-frame-wrapper { 
        background-color: var(--bg-input-dark); 
        border-radius: 28px; 
        padding: 6px 14px; 
        display: flex; 
        flex-direction: column; 
        gap: 6px; 
        border: 1px solid var(--border-monochrome); 
        transition: border-color 0.2s;
    }
    .input-pill-frame-wrapper:focus-within {
        border-color: var(--border-focus);
    }
    .input-row-core-text { 
        display: flex; 
        align-items: center; 
        width: 100%; 
    }
    .input-pill-frame-wrapper input { 
        flex: 1; 
        background: none; 
        border: none; 
        color: var(--text-absolute-white); 
        font-size: 15px; 
        outline: none; 
        padding: 8px 2px; 
    }
    .input-pill-frame-wrapper input::placeholder {
        color: var(--text-dimmed-gray);
    }
    
    .input-row-action-triggers { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        width: 100%; 
    }
    .triggers-left-cluster { 
        display: flex; 
        align-items: center; 
        gap: 12px;
    }
    .mono-icon-trigger-btn { 
        cursor: pointer; 
        width: 30px; 
        height: 30px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
    }
    .mono-icon-trigger-btn svg { 
        width: 20px; 
        height: 20px; 
        color: var(--text-muted-gray);
    }
    .triggers-right-cluster { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
    }
    .circle-submit-data-btn { 
        width: 30px; 
        height: 30px; 
        background: var(--text-absolute-white); 
        color: var(--bg-pure-black); 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
    }
    .circle-submit-data-btn svg {
        width: 15px;
        height: 15px;
        stroke-width: 3px;
        color: var(--bg-pure-black);
    }
    
    .file-attachment-runtime-badge { 
        display: none; 
        align-items: center; 
        justify-content: space-between; 
        background: rgba(255,255,255,0.02); 
        padding: 6px 12px; 
        border-radius: 12px; 
        font-size: 12.5px; 
        color: var(--text-muted-gray); 
        border: 1px solid var(--border-monochrome); 
        margin-top: 2px;
    }
    .file-attachment-runtime-badge .clear-badge-trigger {
        cursor: pointer;
        padding-left: 6px;
        font-weight: 700;
        color: var(--text-absolute-white);
    }

    /* ШТОРКИ И СИСТЕМНЫЕ СЛОИ (BOTTOM SHEETS) */
    .sheet-dark-overlay-layer { 
        position: fixed; 
        top: 0; 
        left: 0; 
        right: 0; 
        bottom: 0; 
        background: rgba(0,0,0,0.7); 
        z-index: 3000; 
        display: none; 
        opacity: 0; 
        transition: opacity 0.2s ease; 
    }
    .sheet-dark-overlay-layer.active { 
        display: block; 
        opacity: 1; 
    }
    
    .bottom-sheet-modal-view { 
        position: fixed; 
        bottom: 0; 
        left: 0; 
        right: 0; 
        background: var(--bg-card-dark); 
        border-top-left-radius: 18px; 
        border-top-right-radius: 18px; 
        z-index: 3001; 
        transform: translateY(100%); 
        transition: transform 0.25s cubic-bezier(0.1, 0.8, 0.5, 1); 
        padding: 16px 16px 28px 16px; 
        border-top: 1px solid var(--border-monochrome); 
        display: flex; 
        flex-direction: column; 
        gap: 8px; 
    }
    .bottom-sheet-modal-view.active { 
        transform: translateY(0); 
    }
    .sheet-drag-handle-bar { 
        width: 32px; 
        height: 4px; 
        background: #242424; 
        border-radius: 2px; 
        align-self: center; 
        margin-bottom: 12px; 
    }
    
    /* ШТОРКА 1: МОДЕЛИ (ИДЕНТИЧНО ФОТО 1) */
    .model-row-item-node { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        padding: 12px 14px; 
        border-radius: 14px; 
        cursor: pointer; 
        transition: background 0.15s; 
    }
    .model-row-item-node:active { 
        background: var(--bg-main-dark); 
    }
    .model-row-item-node.selected { 
        background: rgba(255,255,255,0.03); 
    }
    .model-node-left-meta { 
        display: flex; 
        align-items: center; 
        gap: 14px; 
    }
    .model-node-icon-frame { 
        width: 20px; 
        height: 20px; 
        color: var(--text-muted-gray); 
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .model-node-icon-frame svg {
        width: 100%;
        height: 100%;
        color: var(--text-muted-gray);
    }
    .model-row-item-node.selected .model-node-icon-frame svg {
        color: var(--text-absolute-white);
    }
    .model-node-text-meta { 
        display: flex; 
        flex-direction: column; 
        gap: 2px;
    }
    .model-node-main-title { 
        font-size: 15px; 
        font-weight: 700; 
        color: var(--text-absolute-white); 
    }
    .model-node-sub-desc { 
        font-size: 12.5px; 
        color: var(--text-muted-gray); 
    }
    .model-node-check-mark { 
        width: 16px; 
        height: 16px; 
        color: var(--text-absolute-white); 
        display: none; 
    }
    .model-row-item-node.selected .model-node-check-mark { 
        display: block; 
    }
    
    /* ШТОРКА 2: КНОПКИ АТТАЧЕЙ (ИДЕНТИЧНО ФОТО 2) */
    .attach-grid-layout-box { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px; 
    }
    .attach-grid-interactive-item { 
        background: #111111; 
        border: 1px solid var(--border-monochrome); 
        border-radius: 20px; 
        aspect-ratio: 1.1; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        gap: 10px; 
        cursor: pointer; 
        transition: background 0.15s, transform 0.1s; 
    }
    .attach-grid-interactive-item:active { 
        background: var(--bg-card-dark); 
        transform: scale(0.96); 
    }
    .attach-grid-interactive-item svg { 
        width: 24px; 
        height: 24px; 
        color: var(--text-absolute-white); 
        stroke-width: 1.5px; 
    }
    .attach-grid-interactive-item span { 
        font-size: 13px; 
        font-weight: 700; 
    }

    .hidden-file-inputs-sandbox { 
        display: none !important; 
    }
    </style>
</head>
<body>

    <!-- Системные инпуты под капот -->
    <div class="hidden-file-inputs-sandbox">
        <input type="file" id="kernelGalleryBridge" accept="image/*">
        <!-- Жесткий вызов объектива камеры Vivo через capture="environment" -->
        <input type="file" id="kernelCameraBridge" accept="image/*" capture="environment">
        <input type="file" id="kernelDocumentBridge" accept="*/*">
    </div>

    <!-- САЙДБАР (ИСТОРИЯ СЕССИЙ) -->
    <div class="sidebar-drawer-container" id="sidebarMenuNode">
        <div class="sidebar-profile-header">
            <div class="profile-avatar-circle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="profile-text-meta">
                <div class="profile-main-title">Илья Осипов</div>
                <div class="profile-sub-email">maksimmihajlov8212@gmail.com</div>
            </div>
        </div>
        <div class="sidebar-navigation-area">
            <div class="action-btn-new-chat" onclick="createNewChatSessionHandler()">＋ Новый чат</div>
            <div class="sidebar-group-title">Разговоры</div>
            <div id="sessionHistoryRenderNode" class="history-items-list"></div>
        </div>
    </div>

    <div class="sheet-dark-overlay-layer" id="sheetGlobalOverlay" onclick="dismissAllActiveSheets()"></div>

    <!-- ШТОРКА МОДЕЛЕЙ (ФОТО 1 / 2267.JPG) -->
    <div class="bottom-sheet-modal-view" id="sheetModelSelectorWindow">
        <div class="sheet-drag-handle-bar"></div>
        
        <div class="model-row-item-node" id="target_mod_heavy" onclick="commitModelChange('heavy', 'Тяжелый')">
            <div class="model-node-left-meta">
                <div class="model-node-icon-frame">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"></rect><rect x="14" y="3" width="7" height="5" rx="1"></rect><rect x="14" y="12" width="7" height="9" rx="1"></rect><rect x="3" y="16" width="7" height="5" rx="1"></rect></svg>
                </div>
                <div class="model-node-text-meta">
                    <div class="model-node-main-title">Тяжелый</div>
                    <div class="model-node-sub-desc">Группа экспертов (Prisma 3.1 Pro)</div>
                </div>
            </div>
            <svg class="model-node-check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div class="model-row-item-node" id="target_mod_expert" onclick="commitModelChange('expert', 'Эксперт')">
            <div class="model-node-left-meta">
                <div class="model-node-icon-frame">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                </div>
                <div class="model-node-text-meta">
                    <div class="model-node-main-title">Эксперт</div>
                    <div class="model-node-sub-desc">На базе Grok 4.3 (Prisma 3.5)</div>
                </div>
            </div>
            <svg class="model-node-check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div class="model-row-item-node" id="target_mod_fast" onclick="commitModelChange('fast', 'Быстрый')">
            <div class="model-node-left-meta">
                <div class="model-node-icon-frame">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                </div>
                <div class="model-node-text-meta">
                    <div class="model-node-main-title">Быстрый</div>
                    <div class="model-node-sub-desc">На базе Grok 4.3 (Prisma 2.5)</div>
                </div>
            </div>
            <svg class="model-node-check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>

        <div class="model-row-item-node" id="target_mod_auto" onclick="commitModelChange('auto', 'Авто')">
            <div class="model-node-left-meta">
                <div class="model-node-icon-frame">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5L12 3L19.5 16.5H4.5Z" stroke-linejoin="round"></path></svg>
                </div>
                <div class="model-node-text-meta">
                    <div class="model-node-main-title">Авто</div>
                    <div class="model-node-sub-desc">Выбирает между Быстрым или Экспертным</div>
                </div>
            </div>
            <svg class="model-node-check-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
    </div>

    <!-- ШТОРКА ПЛЮСИКА (ФОТО 2 / 2269.JPG) -->
    <div class="bottom-sheet-modal-view" id="sheetAttachmentWindow">
        <div class="sheet-drag-handle-bar"></div>
        <div class="attach-grid-layout-box">
            <div class="attach-grid-interactive-item" onclick="triggerSystemFileBridgeNode('kernelGalleryBridge')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span>Фото</span>
            </div>
            <div class="attach-grid-interactive-item" onclick="triggerSystemFileBridgeNode('kernelCameraBridge')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                <span>Открыть...</span>
            </div>
            <div class="attach-grid-interactive-item" onclick="triggerSystemFileBridgeNode('kernelDocumentBridge')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                <span>Файлы</span>
            </div>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div class="viewport-main-app">
        <div class="global-layout-shading-mask" id="sidebarShadingMask" onclick="toggleSidebarDrawerNode(false)"></div>

        <!-- ТОНКИЙ ХЕДЕР -->
        <div class="navbar-top-header">
            <div class="navbar-action-trigger" onclick="toggleSidebarDrawerNode(true)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </div>
            <div class="navbar-action-trigger" onclick="createNewChatSessionHandler()" style="justify-content: flex-end;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
            </div>
        </div>

        <!-- ЧАТ СКРОЛЛЕР -->
        <div class="chat-scroller-viewport" id="chatRenderViewport">
            <!-- ЦЕНТРАЛЬНЫЙ ТРЕУГОЛЬНИК PRISMA -->
            <div class="brand-logo-centered-overlay" id="brandLogoCentricNode">
                <svg viewBox="0 0 100 100" fill="none">
                    <path d="M15 25H85L50 85L15 25Z" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
                    <path d="M30 35H70L50 70L30 35Z" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
                    <text x="50" y="20" fill="#ffffff" font-size="7" font-weight="700" letter-spacing="3" text-anchor="middle">PRISMA</text>
                </svg>
            </div>
        </div>
        
        <!-- ИНПУТ ЗОНА -->
        <div class="dock-input-bottom-layout">
            <div class="file-attachment-runtime-badge" id="runtimeAttachmentBadge">
                <span id="runtimeAttachmentNameText">file.dat</span>
                <div class="clear-badge-trigger" onclick="purgeAttachedFileBuffer()">✕</div>
            </div>
            
            <div class="input-pill-frame-wrapper" style="margin-top: 4px;">
                <div class="input-row-core-text">
                    <input type="text" id="chatPayloadInputField" placeholder="Задайте любой вопрос" onkeypress="if(event.key==='Enter') executeClientMessageBroadcast()">
                </div>
                <div class="input-row-action-triggers">
                    <div class="triggers-left-cluster">
                        <!-- ПЛЮСИК С КРАСИВЫМ ВЫЗОВОМ ШТОРКИ (ФОТО 2) -->
                        <div class="mono-icon-trigger-btn" onclick="invokeBottomSheet('sheetAttachmentWindow')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </div>
                        <!-- МОЛНИЯ С КРАСИВЫМ ВЫЗОВОМ ШТОРКИ МОДЕЛЕЙ (ФОТО 1) -->
                        <div class="mono-icon-trigger-btn" onclick="invokeBottomSheet('sheetModelSelectorWindow')" style="margin-left: 2px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                        </div>
                    </div>
                    <div class="triggers-right-cluster">
                        <div class="pill-voice-activation-btn" style="cursor: pointer; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; color: var(--text-muted-gray);">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px; height:19px;"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path></svg>
                        </div>
                        <div class="circle-submit-data-btn" onclick="executeClientMessageBroadcast()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    let runtimeLocalFileBuffer = null;
    let systemStorageState = JSON.parse(localStorage.getItem('prisma_grok_v5_state')) || {
        sessions: {}, activeSessionId: null, activeModelCode: 'fast', activeModelLabel: 'Быстрый'
    };

    function commitStateToDeviceFlash() { localStorage.setItem('prisma_grok_v5_state', JSON.stringify(systemStorageState)); }
    function invokeBottomSheet(id) { document.getElementById('sheetGlobalOverlay').classList.add('active'); document.getElementById(id).classList.add('active'); }
    function dismissAllActiveSheets() { document.getElementById('sheetGlobalOverlay').classList.remove('active'); document.querySelectorAll('.bottom-sheet-modal-view').forEach(el => el.classList.remove('active')); }

    function commitModelChange(modelCode, modelLabel) {
        systemStorageState.activeModelCode = modelCode;
        systemStorageState.activeModelLabel = modelLabel;
        commitStateToDeviceFlash();
        document.querySelectorAll('.model-row-item-node').forEach(el => el.classList.remove('selected'));
        document.getElementById('target_mod_' + modelCode)?.classList.add('selected');
        dismissAllActiveSheets();
    }

    function triggerSystemFileBridgeNode(inputId) { dismissAllActiveSheets(); document.getElementById(inputId).click(); }

    function processIncomingFileStream(e) {
        let file = e.target.files[0]; if (!file) return;
        let reader = new FileReader();
        reader.onloadend = function() {
            runtimeLocalFileBuffer = { base64: reader.result.split(',')[1], mime: file.type, name: file.name };
            document.getElementById('runtimeAttachmentNameText').innerText = `📎 ${file.name}`;
            document.getElementById('runtimeAttachmentBadge').style.display = 'flex';
        };
        reader.readAsDataURL(file); e.target.value = '';
    }

    document.getElementById('kernelGalleryBridge').addEventListener('change', processIncomingFileStream);
    document.getElementById('kernelCameraBridge').addEventListener('change', processIncomingFileStream);
    document.getElementById('kernelDocumentBridge').addEventListener('change', processIncomingFileStream);

    function purgeAttachedFileBuffer() { runtimeLocalFileBuffer = null; document.getElementById('runtimeAttachmentBadge').style.display = 'none'; }
    function toggleSidebarDrawerNode(open) { document.getElementById('sidebarMenuNode').classList.toggle('open', open); document.getElementById('sidebarShadingMask').classList.toggle('visible', open); }

    function renderSidebarSessionsHistoryList() {
        let root = document.getElementById('sessionHistoryRenderNode'); root.innerHTML = '';
        Object.keys(systemStorageState.sessions).reverse().forEach(sid => {
            let item = systemStorageState.sessions[sid];
            let row = document.createElement('div'); row.className = `history-row-node ${sid === systemStorageState.activeSessionId ? 'active' : ''}`;
            let label = document.createElement('span'); label.innerText = item.title || 'Новый чат';
            label.onclick = () => { syncActiveSessionContext(sid); toggleSidebarDrawerNode(false); };
            let del = document.createElement('div'); del.className = 'delete-node-trigger'; del.innerText = '✕';
            del.onclick = (e) => { e.stopPropagation(); deleteSessionFromContext(sid); };
            row.appendChild(label); row.appendChild(del); root.appendChild(row);
        });
    }

    function deleteSessionFromContext(sid) {
        delete systemStorageState.sessions[sid]; if(systemStorageState.activeSessionId === sid) systemStorageState.activeSessionId = null;
        commitStateToDeviceFlash(); renderSidebarSessionsHistoryList();
        if(Object.keys(systemStorageState.sessions).length > 0) syncActiveSessionContext(Object.keys(systemStorageState.sessions).pop());
        else createNewChatSessionHandler();
    }

    function createNewChatSessionHandler() {
        let sId = 'session_' + Date.now(); systemStorageState.sessions[sId] = { title: '', logs: [] };
        systemStorageState.activeSessionId = sId; commitStateToDeviceFlash(); renderSidebarSessionsHistoryList(); syncActiveSessionContext(sId);
    }

    function syncActiveSessionContext(sid) {
        systemStorageState.activeSessionId = sid; commitStateToDeviceFlash(); renderSidebarSessionsHistoryList();
        let scroller = document.getElementById('chatRenderViewport');
        scroller.innerHTML = `<div class="brand-logo-centered-overlay" id="brandLogoCentricNode"><svg viewBox="0 0 100 100" fill="none"><path d="M15 25H85L50 85L15 25Z" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/><text x="50" y="20" fill="#ffffff" font-size="7" font-weight="700" letter-spacing="3" text-anchor="middle">PRISMA</text></svg></div>`;
        let session = systemStorageState.sessions[sid];
        if(!session || session.logs.length === 0) { document.getElementById('brandLogoCentricNode').style.opacity = '1'; return; }
        document.getElementById('brandLogoCentricNode').style.opacity = '0';
        session.logs.forEach(log => {
            if(log.role === 'bot') renderBotResponse智能(log.text, false);
            else renderMessageToDOM(log.role, log.text, log.file_base64, log.mime_type, log.file_name);
        });
        scroller.scrollTop = scroller.scrollHeight;
    }

    function renderMessageToDOM(role, text, fileB64 = null, mime = null, fileName = null) {
        let scroller = document.getElementById('chatRenderViewport');
        let wrapper = document.createElement('div'); wrapper.className = `message-bubble-wrapper ${role === 'user' ? 'user-side' : 'bot-side'}`;
        let contentNode = document.createElement('div'); contentNode.className = 'message-content-node';
        
        if (fileB64 && mime) {
            if (mime.startsWith('image/')) {
                let img = document.createElement('img'); img.src = `data:${mime};base64,${fileB64}`; img.className = 'rendered-media-node'; contentNode.appendChild(img);
            } else {
                let docBox = document.createElement('div'); docBox.className = 'rendered-document-node';
                docBox.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path></svg><span>${fileName || 'Document'}</span>`;
                contentNode.appendChild(docBox);
            }
        }
        
        if (text) {
            let textSpan = document.createElement('span'); textSpan.innerText = text; contentNode.appendChild(textSpan);
        }
        wrapper.appendChild(contentNode); scroller.appendChild(wrapper); scroller.scrollTop = scroller.scrollHeight;
    }

    function renderBotResponse智能(rawText, animate = false) {
        let scroller = document.getElementById('chatRenderViewport');
        let wrapper = document.createElement('div'); wrapper.className = 'message-bubble-wrapper bot-side';
        let contentNode = document.createElement('div'); contentNode.className = 'message-content-node';
        
        let cleanText = rawText; let logsArray = [];
        try {
            let parsed = JSON.parse(rawText); cleanText = parsed.text || rawText;
            if (parsed.logs && Array.isArray(parsed.logs)) logsArray = parsed.logs;
        } catch(e){}

        if (logsArray.length > 0) {
            let logsBlock = document.createElement('div'); logsBlock.className = 'system-terminal-logs-block';
            logsArray.forEach(line => {
                let node = document.createElement('div'); node.className = 'system-log-line info';
                if(line.includes('SUCCESS') || line.includes('успешна') || line.includes('разрешен')) node.className = 'system-log-line success';
                node.innerText = line; logsBlock.appendChild(node);
            });
            contentNode.appendChild(logsBlock);
        }

        let textSpan = document.createElement('span'); contentNode.appendChild(textSpan); wrapper.appendChild(contentNode); scroller.appendChild(wrapper); scroller.scrollTop = scroller.scrollHeight;

        if (animate) {
            let index = 0; let cursor = document.createElement('span'); cursor.className = 'typing-terminal-cursor'; contentNode.appendChild(cursor);
            function printChar() {
                if (index < cleanText.length) { textSpan.innerText += cleanText.charAt(index); index++; scroller.scrollTop = scroller.scrollHeight; setTimeout(printChar, 10); } 
                else { cursor.remove(); }
            }
            printChar();
        } else { textSpan.innerText = cleanText; }
    }

    function executeClientMessageBroadcast() {
        let input = document.getElementById('chatPayloadInputField'); let rawText = input.value.trim();
        if(!rawText && !runtimeLocalFileBuffer) return;
        if(!systemStorageState.activeSessionId) createNewChatSessionHandler();
        let currentSession = systemStorageState.sessions[systemStorageState.activeSessionId];
        
        if(currentSession.logs.length === 0) {
            let title = rawText || "Изображение"; currentSession.title = title.length > 20 ? title.substring(0, 18) + "..." : title;
            document.getElementById('brandLogoCentricNode').style.opacity = '0';
        }
        let log = { role: 'user', text: rawText };
        if (runtimeLocalFileBuffer) { log.file_base64 = runtimeLocalFileBuffer.base64; log.mime_type = runtimeLocalFileBuffer.mime; log.file_name = runtimeLocalFileBuffer.name; }
        currentSession.logs.push(log); input.value = ''; purgeAttachedFileBuffer();
        syncActiveSessionContext(systemStorageState.activeSessionId); dispatchNetworkPackageToTelegram(currentSession.logs);
    }

    function dispatchNetworkPackageToTelegram(logsHistory) {
        let scroller = document.getElementById('chatRenderViewport');
        let loader = document.createElement('div'); loader.className = 'bot-thinking-loader-pills'; loader.id = 'runtimeNetworkLoader';
        loader.innerHTML = `<div class="thinking-circle-dot"></div><div class="thinking-circle-dot"></div><div class="thinking-circle-dot"></div>`;
        scroller.appendChild(loader); scroller.scrollTop = scroller.scrollHeight;
        try { window.Telegram.WebApp.sendData(JSON.stringify({ model: systemStorageState.activeModelCode, history: logsHistory })); } catch(e){}

        // Заглушка-имитация ИИ Studio (в проде ответ пойдет через python бота)
        setTimeout(() => {
            document.getElementById('runtimeNetworkLoader')?.remove();
            let mockJSONResponse = JSON.stringify({
                "status": "SUCCESS",
                "is_command": false,
                "ping": "11ms",
                "logs": [
                    "CORE: Инициализация ядра успешна",
                    "PRISMA: Пакеты данных отправлены на обработку"
                ],
                "text": "Маршрут построен, логи бегут. Модель Prisma " + systemStorageState.activeModelCode + " успешно отработала на Snapdragon 8 Elite! 😂😏"
            });
            window.postMessage(JSON.stringify({ action: 'inject', text: mockJSONResponse }), "*");
        }, 1200);
    }

    window.addEventListener('message', function(event) {
        try {
            let data = JSON.parse(event.data);
            if (data && data.action === 'inject') {
                document.getElementById('runtimeNetworkLoader')?.remove();
                if(systemStorageState.activeSessionId) {
                    systemStorageState.sessions[systemStorageState.activeSessionId].logs.push({ role: 'bot', text: data.text });
                    commitStateToDeviceFlash(); renderBotResponse智能(data.text, true);
                }
            }
        } catch(e){}
    });

    window.onload = () => {
        try { window.Telegram.WebApp.expand(); window.Telegram.WebApp.ready(); } catch(e){}
        commitModelChange(systemStorageState.activeModelCode || 'fast', systemStorageState.activeModelLabel || 'Быстрый');
        if(Object.keys(systemStorageState.sessions).length > 0) syncActiveSessionContext(Object.keys(systemStorageState.sessions).pop());
        else createNewChatSessionHandler();
    };
    </script>
</body>
</html>
